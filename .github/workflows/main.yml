name: Phoenix V100 Playwright Cluster

on:
  schedule:
    - cron: '0 */6 * * *' # Fires every 6 hours
  workflow_dispatch: # Manual ignition button

jobs:
  strike:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        machine_id: [1, 2, 3, 4, 5, 6, 7, 8] # 8 Parallel Machines
    
    steps:
      - name: 🔱 Checkout Command Center
        uses: actions/checkout@v4

      - name: 🔱 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔱 Install Phoenix Dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium

      - name: 🔱 Node Ignition ${{ matrix.machine_id }}
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_ID: ${{ matrix.machine_id }}
        run: |
          # Staggered ignition (15s delay per machine) to bypass IP flood detection
          sleep $(( (${{ matrix.machine_id }} - 1) * 15 ))
          python bot.py
