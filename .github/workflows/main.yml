name: Phoenix V100 (Instant 8-Machine Matrix)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        machine-id: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install playwright
        playwright install chromium

    - name: 🔥 Run Phoenix Engine
      env:
        PYTHONIOENCODING: utf-8
        INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
        TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
        TARGET_NAME: ${{ secrets.TARGET_NAME }}
      run: |
        while true; do
          echo "🚀 Machine Launching..."
          if python -u main.py; then
            echo "✅ Cycle finished. Restarting..."
          else
            echo "❌ Engine crashed. Respawning..."
          fi
          sleep 5
        done
